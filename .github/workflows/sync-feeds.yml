name: Sync feeds

on:
  schedule:
    - cron: "0 6 * * *"   # once a day at 06:00 UTC
  workflow_dispatch:
  push:
    paths:
      - "scripts/sync_feeds.py"
      - ".github/workflows/sync-feeds.yml"

permissions:
  contents: write

concurrency:
  group: sync-feeds
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch Medium & YouTube feeds
        run: python scripts/sync_feeds.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json data/videos.json
          if git diff --cached --quiet; then
            echo "No feed changes."
          else
            git commit -m "chore: sync Medium & YouTube feeds [skip ci]"
            git push
          fi
